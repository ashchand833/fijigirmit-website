backend:
  name: git-gateway
  branch: staging

media_folder: "images/uploads"
public_folder: "/images/uploads"

editor:
  preview: false

collections:
  - name: "events"
    label: "Events"
    folder: "events"
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    fields:
      - { label: "Event Name", name: "title", widget: "string" }
      - { label: "Show on Homepage", name: "show_on_homepage", widget: "boolean", default: true, required: false }
      - { label: "Category", name: "category", widget: "select", required: false, options: ["Upcoming Event", "Photo Gallery"] }
      - { label: "Event Date", name: "date", widget: "datetime", required: false, hint: "Used for sorting. Newer/future dates show first." }
      - { label: "Event Date Display", name: "date_display", widget: "string", required: false, hint: "Example: Sunday 7 June 2026" }
      - { label: "Event Time", name: "time", widget: "string", required: false }
      - { label: "Venue", name: "venue", widget: "string", required: false }
      - { label: "Location", name: "location", widget: "string", required: false }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Gallery Intro", name: "gallery_intro", widget: "text", required: false }
      - { label: "Display Mode", name: "display_mode", widget: "select", default: "gallery", options: ["gallery", "flyer"], required: false, hint: "Use flyer for a single poster/flyer event. Use gallery for photo galleries." }
      - { label: "Sort Order", name: "sort_order", widget: "number", value_type: "int", default: 100, required: false, hint: "Used only when no date is set." }
      - { label: "Event Flyer / Cover Image", name: "flyer", widget: "image", required: false, hint: "This image is used first on cards and popups. Best upload size: 1600x900 landscape." }
      - label: "Event Photos"
        name: "photos"
        widget: "list"
        required: false
        hint: "Optional gallery photos. Best upload size: 1600x900 landscape."
        field: { label: "Image", name: "image", widget: "image" }
