editor:
  preview: false
backend:
  name: git-gateway
  branch: staging
media_folder: "images/uploads"
public_folder: "/images/uploads"
collections:
  - name: "events"
    label: "Events"
    folder: "events"
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    fields:
      - { label: "Event Name", name: "title", widget: "string" }
      - { label: "Show on Homepage", name: "show_on_homepage", widget: "boolean", default: true, required: false }
      - { label: "Category", name: "category", widget: "string", required: false, hint: "Use Upcoming Event or Photo Gallery" }
      - { label: "Event Date", name: "date", widget: "datetime", required: false }
      - { label: "Event Date Display", name: "date_display", widget: "string", required: false, hint: "Example: Saturday 16 May 2026" }
      - { label: "Event Time", name: "time", widget: "string", required: false }
      - { label: "Venue", name: "venue", widget: "string", required: false }
      - { label: "Location", name: "location", widget: "string", required: false }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Gallery Intro", name: "gallery_intro", widget: "text", required: false }
      - { label: "Display Mode", name: "display_mode", widget: "select", default: "gallery", options: ["gallery", "flyer"], required: false }
      - { label: "Sort Order", name: "sort_order", widget: "number", value_type: "int", default: 100, required: false, hint: "Lower number appears first only when no date is set." }
      - { label: "Cover / Event Flyer", name: "flyer", widget: "image", required: false, hint: "This is the main image used on Home and Events pages. Use a 1600x900 landscape image." }
      - label: "Event Photos"
        name: "photos"
        widget: "list"
        required: false
        hint: "Gallery photos. The cover/flyer above is used first; these come after it."
        field: { label: "Image", name: "image", widget: "image" }
