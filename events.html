<!DOCTYPE html>

<html lang="en"><head><meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/><title>Events - Fiji Girmit Foundation NZ</title><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&amp;family=Lora:wght@400;500;600&amp;display=swap" rel="stylesheet"/><style>
:root{--ink:#2f1c14;--gold:#c9a961;--cream:#f7f3ee;--line:#eadfce;--white:#fff;--muted:#6a5b52;--shadow:0 10px 30px rgba(40,24,18,.08)}
*{box-sizing:border-box}html,body{margin:0;padding:0}body{font-family:"Lora",serif;background:var(--cream);color:var(--ink);line-height:1.7}
a{text-decoration:none;color:inherit}img{max-width:100%;display:block}
header{position:sticky;top:0;z-index:1000;background:rgba(255,255,255,.96);backdrop-filter:blur(10px);box-shadow:0 2px 12px rgba(0,0,0,.05)}
.header-inner{max-width:1240px;margin:0 auto;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;gap:20px}.brand{display:flex;align-items:center;gap:14px}.brand img{width:58px;height:58px;object-fit:contain}.brand h1{margin:0;font-family:"Playfair Display",serif;font-size:1.15rem}.brand p{margin:0;color:var(--muted);font-size:.8rem}
nav{display:flex;align-items:center;gap:8px;flex-wrap:wrap}nav a{padding:10px 18px;border-radius:999px;font-size:1rem;transition:.2s}nav a:hover,nav a.active{background:#efe5d7}.donate-btn{background:#dd302c;color:#fff !important;font-weight:700;padding:14px 28px !important}
main{min-height:60vh}.container{max-width:1240px;margin:0 auto;padding:0 24px}.section-block{padding:72px 0}.section-label{margin:0 0 12px;color:var(--gold);letter-spacing:.18em;text-transform:uppercase;font-size:.9rem;font-weight:700}.section-title{margin:0;font-family:"Playfair Display",serif;font-size:3rem;line-height:1.08}.section-subtitle{margin:16px 0 0;color:var(--muted);max-width:860px;font-size:1.08rem}
.grid{display:grid;gap:24px}.card-grid{grid-template-columns:repeat(auto-fit,minmax(280px,1fr));margin-top:32px}.site-card{background:#fff;border:1px solid var(--line);border-radius:24px;overflow:hidden;box-shadow:var(--shadow);transition:transform .2s ease, box-shadow .2s ease;cursor:pointer}.site-card:hover{transform:translateY(-4px);box-shadow:0 18px 34px rgba(40,24,18,.12)}.site-card .media{aspect-ratio:4/3;background:#efe6da;overflow:hidden}.site-card .media img{width:100%;height:100%;object-fit:cover}.site-card .media.media--empty{display:flex;align-items:center;justify-content:center;border:1px dashed #d6c3a8}.media-placeholder{padding:18px;text-align:center;color:#7a6555;font-weight:600}.site-card .content{padding:22px}.eyebrow{margin:0 0 10px;color:var(--gold);font-size:.82rem;text-transform:uppercase;letter-spacing:.12em;font-weight:700}.site-card h3{margin:0 0 10px;font-family:"Playfair Display",serif;font-size:1.9rem;line-height:1.05}.meta{margin:0 0 12px;color:var(--muted);font-size:.97rem}.site-card p{margin:0;color:var(--muted)}.cta{margin-top:14px;color:#a12f27;font-weight:700}
.modal{position:fixed;inset:0;background:rgba(20,13,10,.78);display:none;align-items:center;justify-content:center;padding:24px;z-index:2000}.modal.open{display:flex}.modal-shell{width:min(1120px,100%);background:#fbf8f4;border-radius:28px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.35)}.modal-top{display:flex;align-items:center;justify-content:space-between;padding:24px 28px;border-bottom:1px solid var(--line)}.modal-top h3{margin:0;font-family:"Playfair Display",serif;font-size:2.6rem}.close-btn{background:none;border:none;font-size:2rem;cursor:pointer;color:var(--ink)}.modal-main{display:grid;grid-template-columns:1.1fr .9fr;gap:0;align-items:stretch}.modal-visual{position:relative;display:flex;align-items:center;justify-content:center;background:#111;min-height:520px}.modal-visual img{max-width:100%;max-height:100%;object-fit:contain}.modal-visual.no-image img{display:none}.modal-visual.no-image:before{content:"No image uploaded";color:#fff;font-weight:700}.modal-panel{padding:28px}.modal-panel .meta{margin-bottom:18px}.modal-panel p{margin:0 0 12px;color:var(--muted)}.modal-nav{position:absolute;top:50%;transform:translateY(-50%);width:54px;height:54px;border-radius:999px;border:none;background:rgba(255,255,255,.95);font-size:1.5rem;display:flex;align-items:center;justify-content:center;cursor:pointer}.modal-nav.prev{left:18px}.modal-nav.next{right:18px}.counter{display:inline-flex;padding:8px 14px;border-radius:999px;background:#f1e7da;color:var(--ink);font-weight:700;margin-bottom:18px}
footer{background:#2e1f18;color:#fff;margin-top:72px}.footer-inner{max-width:1240px;margin:0 auto;padding:34px 24px;text-align:center}.footer-links{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;margin-bottom:16px}.footer-links a{color:#dbc7a7}
@media(max-width:1100px){.modal-main{grid-template-columns:1fr}.modal-visual{min-height:360px}}
@media(max-width:760px){.header-inner{flex-direction:column;align-items:flex-start}.section-title,.modal-top h3{font-size:2.1rem}.card-grid{grid-template-columns:1fr}.modal{padding:12px}.modal-shell{border-radius:20px}.modal-top{padding:18px 20px}.modal-panel{padding:20px}.modal-nav{width:44px;height:44px}}

/* Global logo/header format across all pages */
.header-container{max-width:1240px;margin:0 auto;padding:12px 24px;display:flex;justify-content:space-between;align-items:center;gap:22px}.logo-section{display:flex;align-items:center;gap:14px;min-width:360px;color:inherit}.logo-img{width:64px;height:64px;object-fit:contain;flex:0 0 auto}.logo-text h1{margin:0;font-family:"Playfair Display",serif;font-size:1.55rem;line-height:1.1;font-weight:700;color:inherit;white-space:nowrap}.logo-text p{margin:6px 0 0;color:var(--muted,var(--text-light,#63554d));font-size:.98rem;letter-spacing:.2px;white-space:nowrap}@media(max-width:900px){.header-container{align-items:flex-start}.logo-section{min-width:auto}.logo-text h1{font-size:1.35rem}.logo-text p{font-size:.88rem}.logo-img{width:56px;height:56px}nav{width:100%;}}@media(max-width:760px){.header-container{flex-direction:column;align-items:flex-start;padding:12px 18px}.logo-section{width:100%;gap:12px}.logo-img{width:52px;height:52px}.logo-text h1{font-size:1.15rem;white-space:normal}.logo-text p{font-size:.82rem;white-space:normal}}
</style></head>
<body><header><div class="header-container"><a class="logo-section" href="index.html"><img alt="Fiji Girmit Foundation NZ Logo" class="logo-img" src="logo.jpg"/><div class="logo-text"><h1>Fiji Girmit Foundation NZ</h1><p>Remembering · Celebrating · Advocating</p></div></a><nav><a href="index.html">Home</a><a href="about.html">About</a><a href="history.html">History</a><a class="active" href="events.html">Events</a><a href="contact.html">Contact Us</a><a class="donate-btn" href="donate.html">Donate</a></nav></div></header>
<main class="section-block"><div class="container"><h1 class="section-title">Upcoming & Past Events</h1><div class="grid card-grid" id="eventsGrid"></div></div></main>
<div aria-hidden="true" class="modal" id="eventModal"><div class="modal-shell"><div class="modal-top"><h3 data-modal-title="">Event</h3><button class="close-btn" onclick="closeEventModal()">×</button></div><div class="modal-main"><div class="modal-visual"><button class="modal-nav prev" data-modal-prev="" onclick="changeEventModalGallery(-1)">❮</button><img alt="Event image" data-modal-image="" src=""/><button class="modal-nav next" data-modal-next="" onclick="changeEventModalGallery(1)">❯</button></div><div class="modal-panel"><div class="counter" data-modal-counter="">1 / 1</div><div data-modal-text=""></div></div></div></div></div>
<footer><div class="footer-inner"><div class="footer-links"><a href="index.html">Home</a><a href="about.html">About</a><a href="history.html">History</a><a href="events.html">Events</a><a href="contact.html">Contact Us</a><a href="donate.html">Donate</a><a href="/admin/">Admin Login</a></div><div class="footer-social"><a href="https://www.facebook.com/FijiGirmitFoundationNz/" rel="noopener" target="_blank">Facebook</a><a href="mailto:admin@fijigirmit.org.nz">Email</a></div><p>© Fiji Girmit Foundation NZ</p></div></footer>
<script>document.getElementById('eventModal').addEventListener('click', function(e){ if(e.target===this) closeEventModal(); });document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeEventModal(); });</script>
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script><script src="site-content.js"></script>
<script>
async function loadEventsPage() {
 try {
  const items = await cmsLoadEvents();
  window.__eventItems = items;
  const grid = document.getElementById('eventsGrid');
  grid.innerHTML = items.map((item, index) => {
   const image = (item.photos && item.photos[0]) || item.flyer || '';
   const media = image ? `<div class="media"><img src="${cmsEscapeAttr(image)}" alt="${cmsEscapeHtml(item.title)}"></div>` : `<div class="media media--empty"><div class="media-placeholder">No image uploaded</div></div>`;
   return `<article class="site-card" onclick="openEventModalByIndex(${index})">${media}<div class="content"><p class="eyebrow">${cmsEscapeHtml(item.date_display || cmsFormatDate(item.date, false) || eventMetaLine(item))}</p><h3>${cmsEscapeHtml(item.title)}</h3><p class="meta">${cmsEscapeHtml(item.category || (item.display_mode === "gallery" ? "Photo Gallery" : "Event"))}</p><p>${cmsEscapeHtml(item.description || item.gallery_intro || "")}</p><p class="cta">${item.display_mode === 'gallery' ? 'View gallery →' : 'View event →'}</p></div></article>`;
  }).join('');
 } catch (error) { console.warn(error); document.getElementById('eventsGrid').innerHTML = '<div class="notice">Could not load events right now.</div>'; }
}
loadEventsPage();
</script></body></html>
