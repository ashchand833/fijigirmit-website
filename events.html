<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Events - Fiji Girmit Foundation NZ</title>

  <style>
    :root{
      --ink:#2f1c14;
      --gold:#c9a961;
      --cream:#f7f3ee;
      --line:#eadfce;
      --white:#fff;
      --muted:#6a5b52;
      --blue:#68BFEF;
      --shadow:0 10px 30px rgba(40,24,18,.08);
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{font-family:"Lora",serif;background:var(--cream);color:var(--ink);line-height:1.7}
    a{text-decoration:none;color:inherit}
    img{max-width:100%;display:block}

    header{position:sticky;top:0;z-index:1000;background:rgba(255,255,255,.96);backdrop-filter:blur(10px);box-shadow:0 2px 12px rgba(0,0,0,.05)}
    .header-container{max-width:1240px;margin:0 auto;padding:12px 24px;display:flex;justify-content:space-between;align-items:center;gap:22px}
    .logo-section{display:flex;align-items:center;gap:14px;min-width:360px;color:inherit}
    .logo-img{width:64px;height:64px;object-fit:contain;flex:0 0 auto}
    .logo-text h1{margin:0;font-family:"Playfair Display",serif;font-size:1.55rem;line-height:1.1;font-weight:700;color:inherit;white-space:nowrap}
    .logo-text p{margin:6px 0 0;color:var(--muted);font-size:.98rem;letter-spacing:.2px;white-space:nowrap}
    nav{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    nav a{padding:10px 18px;border-radius:999px;font-size:1rem;transition:.2s}
    nav a:hover,nav a.active,nav a[aria-current="page"],nav a:focus{background:#68BFEF!important;color:#18324A!important}
    .donate-btn{background:#68BFEF!important;color:#18324A!important;font-weight:700;padding:14px 28px!important}

    main{min-height:60vh}
    .section-block{padding:72px 0}
    .container{max-width:1240px;margin:0 auto;padding:0 24px}
    .section-title{margin:0 0 34px;font-family:"Playfair Display",serif;font-size:3.2rem;line-height:1.08}
    .grid{display:grid;gap:24px}
    .card-grid{grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}
    .site-card{background:#fff;border:1px solid var(--line);border-radius:24px;overflow:hidden;box-shadow:var(--shadow);transition:transform .2s ease,box-shadow .2s ease;cursor:pointer;text-align:left;width:100%;font:inherit;color:inherit;padding:0}
    .site-card:hover,.site-card:focus{transform:translateY(-4px);box-shadow:0 18px 34px rgba(40,24,18,.12)}
    .site-card:focus{outline:3px solid rgba(29,78,216,.35);outline-offset:3px}
    .media{aspect-ratio:4/3;background:#efe6da;overflow:hidden}
    .media img{width:100%;height:100%;object-fit:cover}
    .content{padding:22px}
    .eyebrow{margin:0 0 10px;color:var(--gold);font-size:.82rem;text-transform:uppercase;letter-spacing:.12em;font-weight:700}
    .site-card h3{margin:0 0 10px;font-family:"Playfair Display",serif;font-size:1.9rem;line-height:1.05}
    .meta{margin:0 0 12px;color:var(--muted);font-size:.97rem}
    .site-card p{margin:0;color:var(--muted)}
    .cta{margin-top:14px!important;color:#68BFEF!important;font-weight:700}

    .modal{position:fixed;inset:0;background:rgba(20,13,10,.78);display:none;align-items:center;justify-content:center;padding:24px;z-index:2000}
    .modal.open{display:flex}
    .modal-shell{width:min(1120px,100%);background:#fbf8f4;border-radius:28px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.35);max-height:92vh}
    .modal-top{display:flex;align-items:center;justify-content:space-between;padding:22px 28px;border-bottom:1px solid var(--line)}
    .modal-top h3{margin:0;font-family:"Playfair Display",serif;font-size:2.2rem;line-height:1.1}
    .close-btn{background:none;border:none;font-size:2rem;cursor:pointer;color:var(--ink)}
    .modal-main{display:grid;grid-template-columns:1.1fr .9fr;gap:0;align-items:stretch;max-height:calc(92vh - 84px)}
    .modal-visual{position:relative;display:flex;align-items:center;justify-content:center;background:#111;min-height:520px;overflow:hidden}
    .modal-visual img{max-width:100%;max-height:100%;object-fit:contain}
    .modal-panel{padding:28px;overflow:auto}
    .modal-panel p{margin:0 0 12px;color:var(--muted)}
    .counter{display:inline-flex;padding:8px 14px;border-radius:999px;background:#f1e7da;color:var(--ink);font-weight:700;margin-bottom:18px}
    .modal-nav{position:absolute;top:50%;transform:translateY(-50%);width:54px;height:54px;border-radius:999px;border:none;background:rgba(255,255,255,.95);font-size:1.5rem;display:flex;align-items:center;justify-content:center;cursor:pointer}
    .modal-nav.prev{left:18px}
    .modal-nav.next{right:18px}

    footer{background:#2e1f18;color:#fff;margin-top:72px}
    .footer-inner{max-width:1240px;margin:0 auto;padding:34px 24px;text-align:center}
    .footer-links{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;margin-bottom:16px}
    .footer-links a{color:#dbc7a7}
    .footer-social{display:flex;gap:18px;justify-content:center;flex-wrap:wrap;margin-bottom:10px}
    .footer-social a{color:#fff}

    @media(max-width:1100px){.modal-main{grid-template-columns:1fr}.modal-visual{min-height:360px}.modal-shell{overflow:auto}}
    @media(max-width:900px){.header-container{align-items:flex-start}.logo-section{min-width:auto}.logo-text h1{font-size:1.35rem}.logo-text p{font-size:.88rem}.logo-img{width:56px;height:56px}nav{width:100%}}
    @media(max-width:760px){.header-container{flex-direction:column;align-items:flex-start;padding:12px 18px}.logo-section{width:100%;gap:12px}.logo-img{width:52px;height:52px}.logo-text h1{font-size:1.15rem;white-space:normal}.logo-text p{font-size:.82rem;white-space:normal}.section-block{padding:46px 0}.section-title{font-size:2.25rem}.container{padding:0 18px}.card-grid{grid-template-columns:1fr}.site-card h3{font-size:1.65rem}.modal{padding:12px}.modal-shell{border-radius:20px}.modal-top{padding:18px 20px}.modal-top h3{font-size:1.7rem}.modal-panel{padding:20px}.modal-nav{width:44px;height:44px}}

<main><section class="section-block"><div class="container"><h1 class="section-title">Upcoming &amp; Past Events</h1><div class="grid card-grid" id="eventsGrid"></div><p id="eventsEmpty" style="display:none;color:#6a5b52;margin-top:20px;">No events have been published yet.</p></div></section></main>
<div aria-hidden="true" class="modal" id="eventModal"><div class="modal-shell"><div class="modal-top"><h3 data-modal-title>Event</h3><button class="close-btn" type="button" onclick="closeEventModal()">×</button></div><div class="modal-main"><div class="modal-visual"><button class="modal-nav prev" data-modal-prev type="button" onclick="changeEventModalGallery(-1)">❮</button><img alt="Event image" data-modal-image src=""/><button class="modal-nav next" data-modal-next type="button" onclick="changeEventModalGallery(1)">❯</button></div><div class="modal-panel"><div class="counter" data-modal-counter>1 / 1</div><div data-modal-text></div></div></div></div></div>

<script src="site-content.js"></script>
<script>
let events=[];let currentEventIndex=0;let currentImageIndex=0;
function escapeHtml(value){return String(value||'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]});}
function eventDateLabel(event){return event.date_display|| (typeof cmsFormatDate==='function'?cmsFormatDate(event.date,true):'') || event.meta || 'Event';}
function eventCategory(event){return event.category || (event.display_mode==='flyer'?'Upcoming Event':'Photo Gallery');}
function eventDescription(event){return event.description || event.gallery_intro || '';}
function renderEvents(){const grid=document.getElementById('eventsGrid');const empty=document.getElementById('eventsEmpty');if(!events.length){empty.style.display='block';return;}empty.style.display='none';grid.innerHTML=events.map((event,index)=>{const image=(typeof cmsCoverImage==='function'?cmsCoverImage(event):((event.flyer||(event.photos&&event.photos[0])||'')));const media=image?`<div class="media"><img src="${escapeHtml(image)}" alt="${escapeHtml(event.title)}"></div>`:`<div class="media"><div style="padding:30px;text-align:center;color:#6a5b52;">No image uploaded</div></div>`;return `<button class="site-card" type="button" onclick="openEventModalByIndex(${index})">${media}<div class="content"><p class="eyebrow">${escapeHtml(eventDateLabel(event))}</p><h3>${escapeHtml(event.title||'Event')}</h3><p class="meta">${escapeHtml(eventCategory(event))}</p><p>${escapeHtml(eventDescription(event))}</p><p class="cta">${eventCategory(event).toLowerCase().includes('gallery')?'View gallery →':'View event →'}</p></div></button>`;}).join('');}
async function loadAndRenderEvents(){try{events=await cmsLoadEvents();}catch(e){events=[];console.warn(e)}events=(typeof cmsSortEvents==='function'?cmsSortEvents(events):events);renderEvents();}
function openEventModalByIndex(index){currentEventIndex=index;currentImageIndex=0;renderEventModal();const modal=document.getElementById('eventModal');modal.classList.add('open');modal.setAttribute('aria-hidden','false');document.body.style.overflow='hidden';}
function closeEventModal(){const modal=document.getElementById('eventModal');modal.classList.remove('open');modal.setAttribute('aria-hidden','true');document.body.style.overflow='';}
function changeEventModalGallery(step){const images=(typeof cmsEventImages==='function'?cmsEventImages(events[currentEventIndex]):[]);if(images.length<2)return;currentImageIndex=(currentImageIndex+step+images.length)%images.length;renderEventModal();}
function renderEventModal(){const event=events[currentEventIndex]||{};const images=(typeof cmsEventImages==='function'?cmsEventImages(event):[]);const title=document.querySelector('[data-modal-title]');const img=document.querySelector('[data-modal-image]');const counter=document.querySelector('[data-modal-counter]');const text=document.querySelector('[data-modal-text]');const prev=document.querySelector('[data-modal-prev]');const next=document.querySelector('[data-modal-next]');title.textContent=event.title||'Event';if(images.length){img.src=images[currentImageIndex];img.alt=event.title||'Event image';}else{img.removeAttribute('src');img.alt='No image uploaded';}counter.textContent=(images.length?(currentImageIndex+1):0)+' / '+(images.length||0);counter.style.display=images.length?'inline-flex':'none';prev.style.display=images.length>1?'flex':'none';next.style.display=images.length>1?'flex':'none';const details=[eventDateLabel(event),event.time?`Time: ${event.time}`:'',event.venue?`Venue: ${event.venue}`:'',event.location?`Location: ${event.location}`:'',eventCategory(event),eventDescription(event)].filter(Boolean);text.innerHTML=details.map(line=>`<p>${escapeHtml(line)}</p>`).join('');}
document.getElementById('eventModal').addEventListener('click',function(e){if(e.target===this)closeEventModal();});document.addEventListener('keydown',function(e){if(e.key==='Escape')closeEventModal();});loadAndRenderEvents();
</script>
</body>
